<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Graph Script Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/monokai.min.css"
    />
    <script src="https://unpkg.com/cytoscape/dist/cytoscape.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar-brand">
        <svg
          class="brand-icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <circle cx="6" cy="6" r="3" />
          <circle cx="18" cy="6" r="3" />
          <circle cx="12" cy="18" r="3" />
          <line x1="8.5" y1="7.5" x2="15.5" y2="7.5" />
          <line x1="7.5" y1="8.5" x2="10.5" y2="16" />
          <line x1="16.5" y1="8.5" x2="13.5" y2="16" />
        </svg>
        <span class="brand-name">GraphScript</span>
      </div>
      <div class="toolbar-actions">
        <button id="btn-add-vertex" class="btn btn--accent" data-i18n-tooltip="tooltip.addVertex" data-tooltip="Добавить вершину">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <circle cx="10" cy="10" r="7" fill="none" stroke="currentColor" stroke-width="1.5" />
            <line x1="10" y1="6" x2="10" y2="14" stroke="currentColor" stroke-width="1.5" />
            <line x1="6" y1="10" x2="14" y2="10" stroke="currentColor" stroke-width="1.5" />
          </svg>
          <span data-i18n="btn.vertex">Вершина</span>
        </button>
        <button id="btn-add-edge" class="btn btn--accent" data-i18n-tooltip="tooltip.addEdge" data-tooltip="Соединить две вершины">
          <svg
            viewBox="0 0 20 20"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            width="16"
            height="16"
          >
            <circle cx="4" cy="10" r="2.5" />
            <circle cx="16" cy="10" r="2.5" />
            <line x1="6.5" y1="10" x2="13.5" y2="10" />
          </svg>
          <span data-i18n="btn.edge">Ребро</span>
        </button>
        <div class="toolbar-separator"></div>
        <button id="btn-delete" class="btn btn--danger" data-i18n-tooltip="tooltip.delete" data-tooltip="Удалить элемент">
          <svg
            viewBox="0 0 20 20"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            width="16"
            height="16"
          >
            <line x1="5" y1="5" x2="15" y2="15" />
            <line x1="15" y1="5" x2="5" y2="15" />
          </svg>
          <span data-i18n="btn.delete">Удалить</span>
        </button>
        <div class="toolbar-separator"></div>
        <button id="btn-run" class="btn btn--run" data-i18n-tooltip="tooltip.run" data-tooltip="Запустить скрипт">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
            <polygon points="5,3 17,10 5,17" />
          </svg>
          <span data-i18n="btn.run">Запуск</span>
        </button>
      </div>
      <div class="toolbar-end">
        <div class="toolbar-status">
          <span class="status-dot"></span>
          <span class="status-text" id="mode-label" data-i18n="mode.default">Перемещение</span>
        </div>
        <button id="btn-lang" class="btn btn--lang">
          <span id="lang-label">EN</span>
        </button>
      </div>
    </header>
    <div class="main-content">
      <div class="graph-panel">
        <div
          class="graph-ambient"
          style="
            width: 300px;
            height: 300px;
            top: 20%;
            left: 30%;
            background: rgba(56, 189, 248, 0.04);
          "
        ></div>
        <div
          class="graph-ambient"
          style="
            width: 200px;
            height: 200px;
            bottom: 15%;
            right: 20%;
            background: rgba(244, 114, 182, 0.03);
            animation-delay: -5s;
          "
        ></div>
        <div class="graph-grid" id="graph-grid"></div>
        <div id="cy"></div>
        <div class="graph-controls">
          <button class="graph-control-btn" id="btn-grid">
            <svg
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              width="14"
              height="14"
            >
              <line x1="7" y1="2" x2="7" y2="18" />
              <line x1="13" y1="2" x2="13" y2="18" />
              <line x1="2" y1="7" x2="18" y2="7" />
              <line x1="2" y1="13" x2="18" y2="13" />
            </svg>
            <span data-i18n="btn.grid">Сетка</span>
          </button>
          <button class="graph-control-btn" id="btn-directed">
            <svg
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              width="14"
              height="14"
            >
              <line x1="3" y1="10" x2="14" y2="10" />
              <polyline points="11,6 15,10 11,14" />
            </svg>
            <span data-i18n="btn.directed">Ориентированный</span>
          </button>
        </div>
        <div class="graph-overlay-corner graph-overlay-corner--tl"></div>
        <div class="graph-overlay-corner graph-overlay-corner--tr"></div>
        <div class="graph-overlay-corner graph-overlay-corner--bl"></div>
        <div class="graph-overlay-corner graph-overlay-corner--br"></div>
      </div>
      <div class="divider divider--v" id="divider-v"></div>
      <div class="right-panel">
        <div class="editor-section">
          <div class="editor-header">
            <svg
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              width="14"
              height="14"
            >
              <polyline points="7,4 3,10 7,16" />
              <polyline points="13,4 17,10 13,16" />
            </svg>
            <span>script.js</span>
          </div>
          <div id="editor"></div>
        </div>
        <div class="divider divider--h" id="divider-h"></div>
        <div class="output-section">
          <div class="output-header">
            <svg
              viewBox="0 0 20 20"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              width="14"
              height="14"
            >
              <polyline points="4,6 8,10 4,14" />
              <line x1="10" y1="14" x2="16" y2="14" />
            </svg>
            <span data-i18n="label.output">Вывод</span>
          </div>
          <div id="output">Вывод будет здесь...</div>
        </div>
      </div>
    </div>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
